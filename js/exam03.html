<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        /*  
            사용자가 정수를 하나 입력하면 그 정수가 짝수, 홀수 판단하여 출력하는 코드 작성
        */
        let num = prompt('정수를 입력하세요')
        console.log(num, typeof num)
        num = Number(num)
        console.log(num, typeof num)

        if(num % 2 == 0) {
            console.log(num + ' : 짝수')
        } else {
            console.log(num + ' : 홀수')
        }

        switch(num % 2) {
            case 0 :
                console.log(num + ' : 짝수')
                break
            default: console.log(num + ' : 홀수')
        }

        //조건 ? 참일 때 실행 : 거짓일 때 실행
        let msg = num % 2 == 0 ? '짝수' : '홀수'
        console.log(num + ' : ' + msg)
        console.log(`${num} : ${msg}`)
    </script>
</head>
<body>
    
</body>
</html>
