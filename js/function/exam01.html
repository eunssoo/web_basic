<head>

    <script>
        function aaa() {
            alert('aaa() 호출...')
        }

        function ccc() {
            alert('ccc() 호출...')
        }

        // 정수 2개의 합을 출력하는 함수 작성
        // 정수 2개의 합을 출력하는 함수 작성
        let printSum = function(a, b) {
            document.write(`${a} + ${b} = ${a + b}<br>`)
        }

        function callback(fn) {
            fn(10, 20)
        }

        aaa()
        ccc()
        callback(printSum)

    </script>
