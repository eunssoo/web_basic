<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <script>
        // 3초가 지나면 alert() 실행되는 코드 작성
        let todo = function() {
            alert('3초 지났다...')
        }

        setTimeout(todo, 3000)

        setTimeout(function() {
            alert('쉬는시간 끝났어.. 다시 집중!!!')
        }, 5000)

        let pId = setInterval(function() {
            document.write(new Date() + '<br>')
        }, 1000)

        setTimeout(function() {
            clearInterval(pId)
        }, 10000)
    </script>
</head>
<body>

</body>
</html>
