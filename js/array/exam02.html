<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        let arr = [2, 5, 12, 7, 34, 7, 21, 3]

        document.write(arr + '<br>')

        arr.sort()  // 배열 변경
        document.write(`sort() 후 arr : ${arr}<br>`) // 사전식 정렬

        // 정수의 오름차순 정렬
        arr.sort(function(left, right) {
            return left - right
        })
        document.write(`오름차순 정렬 arr : ${arr}<br>`)

        // 정수의 내림차순 정렬
        arr.sort(function(left, right) {
            return right - left
        })
        document.write(`내림차순 정렬 arr : ${arr}<br>`)
        document.write('<hr>')

        let states = []
        states['성수'] = '서울특별시'
        states['성남'] = '경기도'
        states['부천'] = '인천광역시'

        for(let state of states) {
            document.write(`${i} : ${states[i]}<br>`)
        }

    </script>
</head>
<body>
    
</body>
</html>
